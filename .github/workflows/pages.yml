name: pages

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "data/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Assemble site (web/ + data/)
        run: |
          mkdir -p _site
          cp -r web/* _site/
          mkdir -p _site/data
          if [[ -f data/snapshot.json ]]; then
            cp data/snapshot.json _site/data/snapshot.json
          else
            echo '{"generated_at":"never","assets":{},"recent_alerts":[]}' \
              > _site/data/snapshot.json
          fi

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
